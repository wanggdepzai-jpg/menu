<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="color-scheme" content="light">
    <title>Menu Quán</title>
    <link rel="icon" type="image/png" href="menu/icon/la.png">
    <link rel="preconnect" href="https://fonts.googleapis.com" crossorigin>
    <link rel="preload" href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=Be+Vietnam+Pro:wght@400;500;600;700&display=swap" as="style" onload="this.onload=null;this.rel='stylesheet'">
    <noscript><link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=Be+Vietnam+Pro:wght@400;500;600;700&display=swap" rel="stylesheet"></noscript>
    <link rel="preload" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" as="style" onload="this.onload=null;this.rel='stylesheet'">
    <noscript><link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"></noscript>
    <style>
        :root {
            color-scheme: light only;
            --cream: #f5ede0;
            --cream-dark: #ecdcc8;
            --brown: #5c3d1e;
            --brown-light: #8b6340;
            --green: #6b8c5a;
            --orange: #d4703a;
            --text: #3b2a1a;
            --text-sub: #7a5c3e;
            --border: rgba(92,61,30,0.15);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        /* Buộc luôn hiển thị giao diện sáng dù trình duyệt dùng dark mode */
        @media (prefers-color-scheme: dark) {
            html { filter: none !important; background: #f5ede0; }
        }

        /* Chặn copy văn bản */
        body {
            -webkit-user-select: none;
            -moz-user-select: none;
            -ms-user-select: none;
            user-select: none;
        }

        /* Chặn kéo/tải ảnh */
        img {
            -webkit-user-drag: none;
            user-drag: none;
            pointer-events: none;
        }

        body {
            font-family: 'Be Vietnam Pro', sans-serif;
            background: var(--cream);
            color: var(--text);
            max-width: 480px;
            margin: 0 auto;
            min-height: 100vh;
            position: relative;
            overflow-x: hidden;
        }

        /* Nền watercolor trang trí */
        body::before {
            content: '';
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background:
                radial-gradient(ellipse at 10% 15%, rgba(180,210,160,0.25) 0%, transparent 45%),
                radial-gradient(ellipse at 90% 80%, rgba(212,112,58,0.15) 0%, transparent 45%),
                radial-gradient(ellipse at 50% 50%, rgba(245,237,224,0.9) 0%, transparent 70%);
            pointer-events: none; z-index: 0;
        }

        /* ===== HEADER ===== */
        header {
            position: sticky; top: 0; z-index: 100;
            background: rgba(245,237,224,0.92);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border-bottom: 2px solid var(--cream-dark);
            padding: 14px 20px;
            display: flex; justify-content: space-between; align-items: center;
        }

        .brand {
            font-family: 'Playfair Display', serif;
            font-size: 1.5rem;
            font-weight: 900;
            color: var(--brown);
            letter-spacing: 1px;
            display: flex; align-items: center; gap: 8px;
        }
        .brand-leaf { font-size: 1.1rem; }

        .header-search-btn {
            background: none; border: none; color: var(--brown);
            font-size: 1.1rem; cursor: pointer; padding: 6px 10px;
            border-radius: 50%;
            transition: background 0.2s;
        }
        .header-search-btn:active { background: var(--cream-dark); }

        /* ===== HERO BANNER ===== */
        .hero-banner {
            position: relative; z-index: 1;
            text-align: center;
            padding: 28px 20px 20px;
            border-bottom: 2px solid var(--cream-dark);
        }
        .hero-ribbon {
            display: inline-block;
            background: var(--brown);
            color: #fff;
            font-family: 'Playfair Display', serif;
            font-size: 2rem;
            font-weight: 900;
            letter-spacing: 6px;
            padding: 10px 40px;
            border-radius: 4px;
            position: relative;
            box-shadow: 0 4px 20px rgba(92,61,30,0.25);
        }
        .hero-ribbon::before, .hero-ribbon::after {
            content: '';
            position: absolute; top: 50%;
            width: 24px; height: 2px;
            background: rgba(255,255,255,0.4);
            transform: translateY(-50%);
        }
        .hero-ribbon::before { left: 14px; }
        .hero-ribbon::after { right: 14px; }
        .hero-sub {
            margin-top: 10px;
            font-size: 0.8rem;
            color: var(--text-sub);
            letter-spacing: 2px;
            font-weight: 500;
            text-transform: uppercase;
        }
        .hero-deco { font-size: 1.2rem; margin-top: 6px; opacity: 0.7; }

        /* ===== CATEGORY NAV ===== */
        .category-nav {
            position: sticky; top: 57px; z-index: 99;
            background: rgba(245,237,224,0.92);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            display: flex; overflow-x: auto; gap: 8px;
            padding: 10px 16px;
            border-bottom: 1px solid var(--border);
            scrollbar-width: none;
        }
        .category-nav::-webkit-scrollbar { display: none; }

        .cat-btn {
            background: rgba(92,61,30,0.07);
            border: 1.5px solid transparent;
            padding: 7px 18px;
            border-radius: 20px;
            font-size: 0.82rem;
            font-weight: 600;
            color: var(--brown-light);
            white-space: nowrap;
            cursor: pointer;
            font-family: 'Be Vietnam Pro', sans-serif;
            transition: background 0.4s cubic-bezier(0.34,1.56,0.64,1),
                        color 0.3s ease,
                        box-shadow 0.4s ease,
                        transform 0.4s cubic-bezier(0.34,1.56,0.64,1),
                        filter 0.2s ease;
            will-change: transform, filter;
        }
        .cat-btn.active {
            background: var(--brown);
            color: #fff;
            border-color: var(--brown);
            box-shadow: 0 4px 18px rgba(92,61,30,0.38);
            transform: scale(1.09);
        }
        .cat-btn.blurring {
            filter: blur(1.8px) brightness(1.12);
            transform: scaleX(1.15) scaleY(0.93);
            transition: filter 0.08s ease, transform 0.08s ease;
        }

        /* ===== MENU SECTION ===== */
        .menu-section {
            position: relative; z-index: 1;
            padding: 0 16px 8px;
            scroll-margin-top: 130px;
        }

        /* Category header */
        .section-header {
            display: flex; align-items: center; gap: 12px;
            padding: 22px 4px 14px;
        }
        .section-header-line {
            flex: 1; height: 1.5px;
            background: linear-gradient(to right, var(--brown-light), transparent);
            opacity: 0.3;
        }
        .section-header-line.right {
            background: linear-gradient(to left, var(--brown-light), transparent);
        }
        .section-title-box {
            display: flex; align-items: center; gap: 8px;
            background: var(--brown);
            color: white;
            padding: 8px 18px;
            border-radius: 30px;
            box-shadow: 0 4px 14px rgba(92,61,30,0.2);
        }
        .section-title-box .s-icon { font-size: 1rem; }
        .section-title-box .s-text {
            font-family: 'Playfair Display', serif;
            font-size: 1rem;
            font-weight: 700;
            letter-spacing: 0.5px;
        }

        /* Menu item card — kiểu tờ menu vintage */
        .menu-item {
            display: flex; align-items: center;
            background: rgba(255,252,247,0.9);
            border: 1.5px solid var(--cream-dark);
            border-radius: 16px;
            padding: 14px;
            margin-bottom: 10px;
            cursor: pointer;
            box-shadow: 0 2px 8px rgba(92,61,30,0.07);
            transition: all 0.25s cubic-bezier(0.25, 0.8, 0.25, 1);
            position: relative;
            overflow: hidden;
        }
        .menu-item::before {
            content: '';
            position: absolute; left: 0; top: 0; bottom: 0; width: 4px;
            background: linear-gradient(to bottom, var(--green), var(--orange));
            border-radius: 4px 0 0 4px;
            opacity: 0;
            transition: opacity 0.25s;
        }
        .menu-item:active {
            transform: scale(0.97);
            background: rgba(245,237,224,0.95);
        }
        .menu-item:active::before { opacity: 1; }

        /* Ảnh / emoji item */
        .item-img {
            width: 90px; height: 90px;
            border-radius: 12px;
            background: var(--cream-dark);
            display: flex; align-items: center; justify-content: center;
            margin-right: 14px; flex-shrink: 0;
            overflow: hidden;
            border: 1.5px solid rgba(92,61,30,0.1);
            box-shadow: 0 2px 8px rgba(92,61,30,0.1);
        }
        .item-img .emoji-fallback { font-size: 2.5rem; }
        .item-img img { width: 100%; height: 100%; object-fit: cover; display: none; }
        .item-img.has-img .emoji-fallback { display: none; }
        .item-img.has-img img { display: block; }

        /* Lazy load shimmer */
        @keyframes shimmer {
            0% { background-position: -200% 0; }
            100% { background-position: 200% 0; }
        }
        .img-shimmer {
            position: absolute; inset: 0;
            background: linear-gradient(90deg, var(--cream-dark) 25%, #f8f0e6 50%, var(--cream-dark) 75%);
            background-size: 200% 100%;
            animation: shimmer 1.4s infinite linear;
            border-radius: 11px;
        }
        .item-img { position: relative; }
        .item-img img.lazy { opacity: 0; transition: opacity 0.4s ease; }
        .item-img img.loaded { opacity: 1; }
        .item-img img.lazy.loaded ~ .img-shimmer,
        .item-img.shimmer-done .img-shimmer { display: none; }

        /* Modal hero shimmer */
        .modal-hero { position: relative; }
        .modal-hero-shimmer {
            position: absolute; inset: 0;
            background: linear-gradient(90deg, var(--cream-dark) 25%, #f8f0e6 50%, var(--cream-dark) 75%);
            background-size: 200% 100%;
            animation: shimmer 1.4s infinite linear;
            z-index: 2;
            transition: opacity 0.3s ease;
        }
        .modal-hero-shimmer.hidden { opacity: 0; pointer-events: none; }
        #modalHeroPhoto { position: relative; z-index: 1; opacity: 0; transition: opacity 0.4s ease; }
        #modalHeroPhoto.loaded { opacity: 1; }

        .item-info { flex: 1; min-height: 90px; display: flex; flex-direction: column; justify-content: space-between; }
        .item-name {
            font-family: 'Playfair Display', serif;
            font-size: 1rem;
            font-weight: 700;
            color: var(--brown);
            line-height: 1.3;
        }
        .item-desc-short {
            font-size: 0.8rem;
            color: var(--text-sub);
            margin: 4px 0;
            line-height: 1.4;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }
        .item-bottom {
            display: flex; justify-content: space-between; align-items: center;
            margin-top: auto;
        }
        .item-price {
            font-size: 1rem;
            font-weight: 700;
            color: var(--orange);
        }
        .view-btn {
            font-size: 0.75rem;
            color: var(--brown-light);
            background: var(--cream-dark);
            padding: 5px 12px;
            border-radius: 20px;
            border: none;
            font-weight: 600;
            display: flex; align-items: center; gap: 4px;
        }

        /* ===== MODAL XEM CHI TIẾT ===== */
        .modal-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(59,42,26,0.5);
            opacity: 0; visibility: hidden;
            transition: all 0.4s ease;
            z-index: 2000;
            backdrop-filter: blur(6px);
            -webkit-backdrop-filter: blur(6px);
        }
        .modal-overlay.active { opacity: 1; visibility: visible; }

        .modal-content {
            position: fixed; bottom: -100%; left: 50%; transform: translateX(-50%);
            width: 100%; max-width: 480px;
            background: var(--cream);
            border-top-left-radius: 28px; border-top-right-radius: 28px;
            padding: 0 0 44px 0;
            transition: bottom 0.5s cubic-bezier(0.15, 0.85, 0.35, 1);
            z-index: 2001;
            overflow: hidden;
            box-shadow: 0 -8px 40px rgba(59,42,26,0.2);
        }
        .modal-content.active { bottom: 0; }

        .close-modal {
            position: absolute; top: 14px; right: 14px;
            width: 34px; height: 34px;
            background: rgba(59,42,26,0.45);
            border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            font-size: 1rem; cursor: pointer; color: white;
            z-index: 10; backdrop-filter: blur(4px);
        }

        .modal-hero {
            width: 100%; height: 360px;
            position: relative; overflow: hidden;
            background: var(--cream-dark);
        }
        .modal-hero img { width: 100%; height: 100%; object-fit: cover; }
        .modal-emoji-fallback {
            position: absolute; top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            font-size: 6rem;
        }
        /* Gradient overlay dưới ảnh */
        .modal-hero::after {
            content: '';
            position: absolute; bottom: 0; left: 0; right: 0; height: 80px;
            background: linear-gradient(to top, var(--cream), transparent);
            z-index: 3;
        }

        .modal-body { padding: 24px 24px 10px; }
        .modal-name {
            font-family: 'Playfair Display', serif;
            font-size: 1.6rem; font-weight: 900;
            color: var(--brown); letter-spacing: -0.3px;
        }
        .modal-divider {
            display: flex; align-items: center; gap: 10px;
            margin: 10px 0 16px;
        }
        .modal-divider-line { flex: 1; height: 1px; background: var(--cream-dark); }
        .modal-divider-icon { color: var(--orange); font-size: 0.9rem; }
        .modal-desc-full {
            font-size: 0.95rem;
            color: var(--text-sub);
            line-height: 1.75;
            white-space: pre-line; /* Giúp hiển thị ngắt dòng của danh sách nguyên liệu */
        }

        /* ===== SEARCH OVERLAY ===== */
        .search-overlay {
            position: fixed; top: 0; left: 50%; transform: translateX(-50%);
            width: 100%; max-width: 480px; height: 100%;
            background: var(--cream); z-index: 4000;
            display: flex; flex-direction: column;
            opacity: 0; pointer-events: none;
            transition: opacity 0.25s ease;
        }
        .search-overlay.active { opacity: 1; pointer-events: all; }
        .search-bar-wrap {
            display: flex; align-items: center; gap: 12px;
            padding: 16px 18px;
            border-bottom: 1.5px solid var(--cream-dark);
            background: rgba(245,237,224,0.95);
        }
        .search-input {
            flex: 1; border: none; outline: none;
            font-size: 1rem; font-weight: 500;
            background: transparent; color: var(--text);
            font-family: 'Be Vietnam Pro', sans-serif;
        }
        .search-input::placeholder { color: var(--text-sub); }
        .search-cancel {
            background: none; border: none; color: var(--orange);
            font-size: 0.9rem; font-weight: 700; cursor: pointer;
        }
        .search-results { flex: 1; overflow-y: auto; padding: 10px 18px; }
        .search-empty { padding: 60px 0; text-align: center; color: var(--text-sub); font-size: 0.9rem; }
        .search-hit {
            display: flex; align-items: center; gap: 14px;
            padding: 12px 0; border-bottom: 1px solid var(--cream-dark); cursor: pointer;
        }
        .search-hit-icon { font-size: 1.8rem; width: 40px; text-align: center; flex-shrink: 0; }
        .search-hit-name { font-weight: 700; color: var(--brown); font-size: 0.95rem; }
        .search-hit-cat { font-size: 0.78rem; color: var(--text-sub); margin-top: 2px; }

        /* Footer decoration */
        .menu-footer {
            position: relative; z-index: 1;
            text-align: center;
            padding: 30px 20px 50px;
            color: var(--text-sub);
            font-size: 0.8rem;
            border-top: 1.5px dashed var(--cream-dark);
            margin-top: 16px;
        }
        .menu-footer-icon { font-size: 1.4rem; margin-bottom: 6px; display: block; opacity: 0.5; }
    </style>
</head>
<body>

    <header>
        <div class="brand"><span class="brand-leaf">🌿</span> Thực Đơn</div>
        <button class="header-search-btn" onclick="openSearch()"><i class="fas fa-search"></i></button>
    </header>

    <div class="hero-banner">
        <div class="hero-ribbon">MENU</div>
        <div class="hero-sub">Thức uống & Đồ ăn</div>
        <div class="hero-deco">🌸 🍃 🌼</div>
    </div>

    <nav class="category-nav" id="catNav"></nav>

    <main id="menu-container"></main>

    <div class="menu-footer">
        <span class="menu-footer-icon">☕</span>
        Cảm ơn bạn đã ghé thăm
    </div>

    <div class="modal-overlay" id="modalOverlay"></div>
    <div class="modal-content" id="itemModal">
        <div class="close-modal" onclick="closeModal()"><i class="fas fa-times"></i></div>
        <div class="modal-hero">
            <div class="modal-hero-shimmer" id="modalHeroShimmer" style="display:none"></div>
            <img src="" id="modalHeroPhoto" alt="" />
            <div class="modal-emoji-fallback" id="modalEmojiFallback">☕</div>
        </div>
        <div class="modal-body">
            <h2 class="modal-name" id="modalName"></h2>
            <div class="modal-divider">
                <div class="modal-divider-line"></div>
                <i class="fas fa-leaf modal-divider-icon"></i>
                <div class="modal-divider-line"></div>
            </div>
            <p class="modal-desc-full" id="modalDescription"></p>
        </div>
    </div>

    <div class="search-overlay" id="searchOverlay">
        <div class="search-bar-wrap">
            <i class="fas fa-search" style="color:var(--text-sub);font-size:0.9rem;"></i>
            <input class="search-input" id="searchInput" type="text" placeholder="Tìm món ăn, đồ uống..." oninput="doSearch()" />
            <button class="search-cancel" onclick="closeSearch()">Huỷ</button>
        </div>
        <div class="search-results" id="searchResults">
            <div class="search-empty">
                <i class="fas fa-search" style="font-size:2rem;display:block;margin-bottom:10px;opacity:0.2;"></i>
                Nhập tên món bạn muốn tìm
            </div>
        </div>
    </div>

    <script>
        // Chặn chuột phải (context menu) để tránh save ảnh / copy
        document.addEventListener('contextmenu', function(e) { e.preventDefault(); return false; });

        // Chặn phím tắt copy (Ctrl+C / Ctrl+A / Ctrl+S)
        document.addEventListener('keydown', function(e) {
            if (e.ctrlKey && ['c','a','s','u'].includes(e.key.toLowerCase())) {
                e.preventDefault(); return false;
            }
        });

        const menuData = [
            { id: 'cafe', title: 'Cafe', icon: '☕', items: [
                { name: 'Đen đá / nóng', price: 20000, icon: '☕', shortDesc: 'Cà phê nguyên chất, đậm vị.', fullDesc: 'Hương vị cà phê nguyên bản, rang xay mộc mạc mang đến sự tỉnh táo tức thì. Phù hợp cho những ai yêu thích vị đắng truyền thống đặc trưng của hạt Robusta.\n\n🌿 Nguyên liệu chính:\n- Hạt cà phê Robusta rang mộc nguyên chất\n- Nước tinh khiết đun sôi\n- Đường phèn/đường cát (tuỳ chọn)', img: 'menu/den_da.webp' },
                { name: 'Nâu đá / nóng', price: 25000, icon: '☕', shortDesc: 'Cà phê hòa quyện sữa béo.', fullDesc: 'Sự kết hợp hoàn hảo giữa cốt cà phê pha phin thơm nồng và lớp sữa đặc béo ngậy. Thức uống kinh điển đậm đà của người Việt.\n\n🌿 Nguyên liệu chính:\n- Cốt cà phê Robusta pha phin đậm đặc\n- Sữa đặc có đường hảo hạng\n- Đá viên tinh khiết', img: 'menu/nau_da.webp' },
                { name: 'Bạc xỉu', price: 30000, icon: '🥛', shortDesc: 'Sữa tươi thơm béo, ít cà phê.', fullDesc: 'Nhiều sữa béo hơn, chỉ điểm một chút cà phê cốt, thích hợp cho người yêu vị ngọt dịu và hương thơm cà phê nhẹ nhàng tinh tế.\n\n🌿 Nguyên liệu chính:\n- Sữa tươi nguyên chất thanh trùng\n- Sữa đặc béo ngọt\n- Cốt cà phê phin nguyên chất nhỏ giọt tạo tầng\n- Đá viên', img: 'menu/bac_xiu.webp' },
                { name: 'Cà phê muối', price: 30000, icon: '🧂', shortDesc: 'Vị mặn ngọt béo độc đáo.', fullDesc: 'Lớp kem mặn béo ngậy mịn màng phía trên hòa quyện cùng vị đắng nhẹ của cà phê bên dưới tạo nên một trải nghiệm vị giác đầy bùng nổ và lôi cuốn.\n\n🌿 Nguyên liệu chính:\n- Cốt cà phê phin đậm vị\n- Kem béo thực vật (Whipping/Topping cream)\n- Muối biển tinh luyện\n- Sữa đặc dịu ngọt', img: 'menu/ca_phe_muoi.webp' },
                { name: 'Cà phê cốt dừa', price: 30000, icon: '🥥', shortDesc: 'Cà phê pha cốt dừa xay đá.', fullDesc: 'Cốt dừa được xay mịn với đá tạo độ xốp mượt, kết hợp với dòng cà phê đậm đà. Thức uống lạ miệng, mát lạnh và cực kỳ thơm mùi dừa.\n\n🌿 Nguyên liệu chính:\n- Nước cốt dừa tươi béo ngậy\n- Sữa đặc & sữa tươi\n- Cốt cà phê Robusta nguyên chất\n- Đá viên xay tuyết mịn', img: 'menu/ca_phe_cot_dua.webp' }

        // Scroll spy — smooth + motion blur
        const sections = document.querySelectorAll('.menu-section');
        const navBtns = document.querySelectorAll('.cat-btn');
        let activeId = '';
        let scrollRaf = null;
        let blurTimer = null;
        let navScrolling = false;
        let navScrollTimer = null;

        function smoothScrollNav(btn) {
            const nav = document.querySelector('.category-nav');
            const navRect = nav.getBoundingClientRect();
            const btnRect = btn.getBoundingClientRect();
            const targetLeft = nav.scrollLeft + btnRect.left - navRect.left - (navRect.width / 2) + (btnRect.width / 2);
            const start = nav.scrollLeft;
            const dist = targetLeft - start;
            const dur = 500;
            let startTime = null;

            function easeInOutQuart(t) {
                return t < 0.5 ? 8*t*t*t*t : 1 - 8*(--t)*t*t*t;
            }

            function step(ts) {
                if (!startTime) startTime = ts;
                const progress = Math.min((ts - startTime) / dur, 1);
                nav.scrollLeft = start + dist * easeInOutQuart(progress);
                if (progress < 1) requestAnimationFrame(step);
            }
            requestAnimationFrame(step);
        }

        function setActiveBtn(id) {
            if (id === activeId) return;
            activeId = id;

            navBtns.forEach((btn, i) => {
                const isActive = menuData[i].id === id;
                if (isActive && !btn.classList.contains('active')) {
                    // Motion blur flash before activating
                    btn.classList.add('blurring');
                    clearTimeout(blurTimer);
                    blurTimer = setTimeout(() => {
                        btn.classList.remove('blurring');
                        btn.classList.add('active');
                        smoothScrollNav(btn);
                    }, 90);
                } else if (!isActive) {
                    btn.classList.remove('active', 'blurring');
                }
            });
        }

            if (scrollRaf) cancelAnimationFrame(scrollRaf);

                let current = '';
                const offset = window.innerHeight * 0.3;
                sections.forEach(sec => {
                    const top = sec.getBoundingClientRect().top;
                    if (top <= offset) current = sec.getAttribute('id');
                });
                if (current) setActiveBtn(current);
            });
        }, { passive: true });

        function scrollToSec(id) {
            const el = document.getElementById(id);

            const y = el.getBoundingClientRect().top + window.scrollY - 130;

        // Lazy load thumbnail via IntersectionObserver
        function initLazyImages() {
            const lazyImgs = document.querySelectorAll('img.lazy');
            if (!lazyImgs.length) return;
            const io = new IntersectionObserver((entries, obs) => {
                entries.forEach(entry => {
                    if (!entry.isIntersecting) return;
                    const img = entry.target;
                    img.src = img.dataset.src;
                    img.onload = () => {
                        img.classList.add('loaded');
                        img.closest('.item-img').classList.add('shimmer-done');
                    };
                    obs.unobserve(img);
                });
            }, { rootMargin: '200px 0px' }); // pre-load 200px trước khi vào viewport
            lazyImgs.forEach(img => io.observe(img));
        }
        initLazyImages();

            imgEl.classList.remove('loaded');

            if (item.img) {

                fallbackEl.style.display = 'none';

                const fullImg = new Image();
                fullImg.onload = () => {
                    imgEl.src = fullImg.src;
                    imgEl.classList.add('loaded');
                    if (shimmerEl) shimmerEl.classList.add('hidden');
                };
                fullImg.src = item.img;
            } else {
                imgEl.style.display = 'none';
                fallbackEl.innerText = item.icon;
                fallbackEl.style.display = 'block';
                if (shimmerEl) shimmerEl.style.display = 'none';
            }

            document.getElementById('modalOverlay').classList.add('active');
            document.getElementById('itemModal').classList.add('active');
        }
        function closeModal() {
            document.getElementById('modalOverlay').classList.remove('active');
            document.getElementById('itemModal').classList.remove('active');
            // Reset ảnh để tránh flash ảnh cũ lần sau
            setTimeout(() => {
                const imgEl = document.getElementById('modalHeroPhoto');
                imgEl.src = ''; imgEl.classList.remove('loaded');
            }, 350);
        }
        document.getElementById('modalOverlay').addEventListener('click', closeModal);

        // Search
        function openSearch() {
            document.getElementById('searchOverlay').classList.add('active');
            setTimeout(() => document.getElementById('searchInput').focus(), 100);
        }
        function closeSearch() {
            document.getElementById('searchOverlay').classList.remove('active');
            document.getElementById('searchInput').value = '';
            document.getElementById('searchResults').innerHTML = '<div class="search-empty"><i class="fas fa-search" style="font-size:2rem;display:block;margin-bottom:10px;opacity:0.2;"></i>Nhập tên món bạn muốn tìm</div>';
        }
        function doSearch() {
            const q = document.getElementById('searchInput').value.trim().toLowerCase();
            const container = document.getElementById('searchResults');
            if (!q) { container.innerHTML = '<div class="search-empty"><i class="fas fa-search" style="font-size:2rem;display:block;margin-bottom:10px;opacity:0.2;"></i>Nhập tên món bạn muốn tìm</div>'; return; }
            let hits = [];
            menuData.forEach(sec => sec.items.forEach(item => {
                if (item.name.toLowerCase().includes(q) || item.shortDesc.toLowerCase().includes(q))
                    hits.push({ ...item, cat: sec.icon + ' ' + sec.title });
            }));
            if (!hits.length) {
                container.innerHTML = '<div class="search-empty">😕 Không tìm thấy món phù hợp</div>';
            } else {
                container.innerHTML = hits.map(h => `
                    <div class="search-hit" onclick="closeSearch();openModal(${JSON.stringify(h).replace(/"/g,'&quot;')})">
                        <div class="search-hit-icon">${h.icon}</div>
                        <div>
                            <div class="search-hit-name">${h.name}</div>
                            <div class="search-hit-cat">${h.cat}</div>
                        </div>
                    </div>`).join('');
            }
        }
    </script>
</body>
</html>
